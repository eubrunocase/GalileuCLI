name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact: galileu-darwin-arm64
          - goos: darwin
            goarch: amd64
            artifact: galileu-darwin-amd64
          - goos: linux
            goarch: amd64
            artifact: galileu-linux-amd64
          - goos: windows
            goarch: amd64
            artifact: galileu-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ${{ matrix.artifact }} \
            ./cmd/sentinel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Galileu ${{ github.ref_name }}"
          body: |
            ## Galileu ${{ github.ref_name }}

            Proxy de segurança e governança para LLMs — protege dados sensíveis
            antes que cheguem aos provedores de IA.

            ### Download

            | Plataforma | Arquivo |
            |---|---|
            | macOS Apple Silicon (M1/M2/M3) | `galileu-darwin-arm64` |
            | macOS Intel | `galileu-darwin-amd64` |
            | Linux | `galileu-linux-amd64` |
            | Windows | `galileu-windows-amd64.exe` |

            ### Instalação rápida

            **macOS / Linux**
```bash
            chmod +x galileu-*
            ./galileu-darwin-arm64   # ou o binário da sua plataforma
```

            **Windows**
            Execute `galileu-windows-amd64.exe` como Administrador.

            ### Verificar integridade
```bash
            sha256sum -c checksums.txt
```
          files: |
            dist/*
          draft: false
          prerelease: false