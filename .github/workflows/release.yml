name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact: galileu-darwin-arm64
          - goos: darwin
            goarch: amd64
            artifact: galileu-darwin-amd64
          - goos: linux
            goarch: amd64
            artifact: galileu-linux-amd64
          - goos: windows
            goarch: amd64
            artifact: galileu-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" \
            -o ${{ matrix.artifact }} \
            ./cmd/sentinel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Galileu ${{ github.ref_name }}"
          body: |
            ## Galileu ${{ github.ref_name }}

            Proxy reverso MITM de segurança e governança para LLMs.
            Intercepta e sanitiza dados sensíveis antes que cheguem aos provedores de IA.

            ### Plataformas

            | Plataforma | Arquivo |
            |---|---|
            | macOS Apple Silicon | galileu-darwin-arm64 |
            | macOS Intel | galileu-darwin-amd64 |
            | Linux x86_64 | galileu-linux-amd64 |
            | Windows x86_64 | galileu-windows-amd64.exe |

            ### Inicio rapido

            macOS e Linux: chmod +x galileu-* e execute o binario da sua plataforma.
            Windows: execute galileu-windows-amd64.exe como Administrador.
            Configure sua ferramenta de IA para usar o proxy na porta 9000.

            ### Licenca

            Apache 2.0 - Bruno Dantas de Oliveira Case
          files: |
            dist/*
          draft: false
          prerelease: false