name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact: galileu-darwin-arm64
          - goos: darwin
            goarch: amd64
            artifact: galileu-darwin-amd64
          - goos: linux
            goarch: amd64
            artifact: galileu-linux-amd64
          - goos: windows
            goarch: amd64
            artifact: galileu-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" \
            -o ${{ matrix.artifact }} \
            ./cmd/sentinel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Galileu ${{ github.ref_name }}"
          body: |
            ## Galileu ${{ github.ref_name }}

            Versão oficial do GalileuCLI

            ## Checksums SHA256

            Execute o comando abaixo para verificar:

            Linux/macOS:
            ```bash
            sha256sum -c checksums.txt
            ```

            Windows (PowerShell):
            ```powershell
            Get-FileHash galileu-windows-amd64.exe -Algorithm SHA256
            ```

            O arquivo checksums.txt está anexado nesta release.
            
          files: |
            dist/*
          draft: false
          prerelease: false