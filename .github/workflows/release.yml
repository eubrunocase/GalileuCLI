name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact: galileu-darwin-arm64
          - goos: darwin
            goarch: amd64
            artifact: galileu-darwin-amd64
          - goos: linux
            goarch: amd64
            artifact: galileu-linux-amd64
          - goos: windows
            goarch: amd64
            artifact: galileu-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }}..."
          go build -ldflags="-s -w" \
            -o ${{ matrix.artifact }} \
            ./cmd/galileu
          ls -la ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Galileu ${{ github.ref_name }}"
          body: |
            ## Galileu ${{ github.ref_name }}

            Proxy de Segurança e Governança para Ferramentas de AI.

            ### Novidades desta Versão

            - **Suporte a Múltiplas Ferramentas**: Compatível com OpenCode, Claude Code, Cursor, Windsurf, GitHub Copilot, Gemini CLI, Codex e qualquer ferramenta que suporte proxy customizado
            - **Detecção Automática**: Identifica requisições de AI automaticamente através da análise do payload JSON
            - **Provider Inference**: Provider é inferido automaticamente do payload (não depende do host)
            - **Modo Passive**: Novo modo de operação para ferramentas que usam múltiplas APIs
            - **Wildcard Matching**: Suporte a padrões como `*.openai.com`, `*.telemetry.*`

            ### Como Usar

            **Modo Whitelist (padrão):**
            ```yaml
            proxy:
              mode: whitelist
              allowed_hosts:
                - "*.openai.com"
                - "*.anthropic.com"
            ```

            **Modo Passive (Claude Code, Cursor, Windsurf):**
            ```yaml
            proxy:
              mode: passive
              skip_hosts:
                - "*.telemetry.*"
                - "*.analytics.*"
            ```

            ### Detecção de Dados Sensíveis

            Sanitiza automaticamente:
            - API Keys (OpenAI, Anthropic, Google, GitHub)
            - Tokens (Slack, Discord, AWS)
            - Credenciais personalizadas via regex/literal

            ### Verificação de Integridade

            Execute o comando abaixo para verificar:

            Linux/macOS:
            ```bash
            sha256sum -c checksums.txt
            ```

            Windows (PowerShell):
            ```powershell
            Get-FileHash galileu-windows-amd64.exe -Algorithm SHA256
            ```

            O arquivo checksums.txt está anexado nesta release.

          files: |
            dist/*
          draft: false
          prerelease: false